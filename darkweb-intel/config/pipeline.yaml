# pipeline.yaml
# Hyperparameters for the TAIG processing pipeline.
# All tunable values live here — no magic numbers in source code.

embeddings:
  batch_size: 512
  normalize: true
  # Max documents per language subset fed into topic modeling.
  # Increase if VRAM > 8 GB; decrease if OOM errors occur.
  max_docs_per_language: 20000
  cache_dir: models/embedding_cache

umap:
  n_neighbors: 15
  n_components: 5
  min_dist: 0.0
  metric: cosine
  random_state: 42
  low_memory: false   # set true if hitting RAM limits

hdbscan:
  min_cluster_size: 30
  min_samples: null   # null = same as min_cluster_size (default)
  metric: euclidean
  cluster_selection_method: eom
  prediction_data: true

bertopic:
  top_n_words: 10
  verbose: true
  # Vectorizer settings per language
  vectorizer:
    en:
      stop_words: english
      min_df: 5
      ngram_range: [1, 2]
    ru:
      stop_words: null
      min_df: 5
      ngram_range: [1, 2]
    default:
      stop_words: null
      min_df: 5
      ngram_range: [1, 2]

ingestion:
  # Minimum message body length (chars) to retain after cleaning
  min_body_length: 5
  # Drop duplicates on this column; null disables dedup
  dedup_column: msg_id

ner:
  # Confidence threshold for entity inclusion
  confidence_threshold: 0.7
  # Maximum message length (chars) sent to NER model in one pass
  max_sequence_length: 512

attack_mapper:
  # Minimum cosine similarity to accept a technique match
  similarity_threshold: 0.65
  # Number of candidate techniques returned per entity
  top_k: 3

retrieval:
  # Number of results returned by default
  top_k: 10
  # Hybrid fusion weight: 1.0 = pure vector, 0.0 = pure BM25
  vector_weight: 0.7
